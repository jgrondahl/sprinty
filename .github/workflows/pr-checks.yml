name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  forbidden-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject forbidden TypeScript and logging patterns
        shell: bash
        run: |
          set -euo pipefail

          fail=0

          SEARCH_DIRS="packages/api packages/core packages/db packages/integrations"
          EXCLUDE_ARGS=(
            --exclude='*.test.ts' --exclude='*.spec.ts' --exclude='*.test.tsx' --exclude='*.spec.tsx'
            --exclude-dir=node_modules --exclude-dir=dist
          )

          if grep -R -nE "as any" "$SEARCH_DIRS" "${EXCLUDE_ARGS[@]}"; then
            echo "Forbidden pattern found: as any"
            fail=1
          fi

          if grep -R -nE "@ts-ignore|@ts-expect-error" "$SEARCH_DIRS" "${EXCLUDE_ARGS[@]}"; then
            echo "Forbidden pattern found: ts suppression"
            fail=1
          fi

          if grep -R -nE "console\.log\(" "$SEARCH_DIRS" "${EXCLUDE_ARGS[@]}"; then
            echo "Forbidden pattern found: console.log"
            fail=1
          fi

          if grep -R -nE "catch\s*\([^)]*\)\s*\{\s*\}" "$SEARCH_DIRS" "${EXCLUDE_ARGS[@]}"; then
            echo "Forbidden pattern found: empty catch block"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

  secret-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject committed secret-like values in templates/docs
        shell: bash
        run: |
          set -euo pipefail

          fail=0

          if grep -R -nE "ATATT3[A-Za-z0-9_-]+" .env.example docs 2>/dev/null; then
            echo "Forbidden pattern found: Jira API token-like value"
            fail=1
          fi

          if grep -R -nE "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}" .env.example | grep -v "developer@example.com"; then
            echo "Forbidden pattern found: non-placeholder email in .env.example"
            fail=1
          fi

          if grep -R -nE "\b(ghp_[A-Za-z0-9]{20,}|gho_[A-Za-z0-9]{20,}|ghu_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk-ant-[A-Za-z0-9-]{10,})\b" .env.example docs 2>/dev/null; then
            echo "Forbidden pattern found: token-like value in templates/docs"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Build web
        run: bun run --cwd packages/web build
      - name: Calculate dist size
        id: bundle_size
        shell: bash
        run: |
          set -euo pipefail
          size_bytes=$(du -sb packages/web/dist | cut -f1)
          size_kb=$((size_bytes / 1024))
          echo "size_bytes=$size_bytes" >> "$GITHUB_OUTPUT"
          echo "size_kb=$size_kb" >> "$GITHUB_OUTPUT"
      - name: Comment bundle size on PR
        uses: actions/github-script@v7
        with:
          script: |
            const sizeBytes = '${{ steps.bundle_size.outputs.size_bytes }}';
            const sizeKb = '${{ steps.bundle_size.outputs.size_kb }}';
            const body = `📦 Web dist bundle size: **${sizeKb} KB** (${sizeBytes} bytes)`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
